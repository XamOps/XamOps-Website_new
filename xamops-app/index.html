<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Default title & description (overridden per-page by MetaManager) ── -->
    <title>Cloud FinOps &amp; DevOps Automation Platform | Xamops</title>
    <meta name="description" content="Automate cloud operations, reduce infrastructure costs, and optimize performance with Xamops — the cloud automation platform for FinOps, DevOps, and SRE teams." />
    <meta name="keywords" content="cloud automation platform, FinOps platform, DevOps automation platform, cloud cost optimization, cloud management platform, SRE automation platform, cloud operations automation, AI cloud optimization, cloud infrastructure automation, enterprise cloud automation" />

    <!-- ── Robots & Canonical ── -->
    <link rel="canonical" href="https://xamops.com/" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="XamOps Technologies" />
    <meta name="geo.region" content="IN-DL" />
    <meta name="geo.placename" content="New Delhi, India" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Xamops" />
    <meta property="og:url" content="https://xamops.com/" />
    <meta property="og:title" content="Cloud Automation Platform for FinOps, DevOps &amp; SRE | Xamops" />
    <meta property="og:description" content="Automate cloud operations, reduce infrastructure costs, and optimize performance with Xamops cloud automation platform for FinOps, DevOps, and SRE teams." />
    <meta property="og:image" content="https://xamops.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Xamops — Cloud Automation Platform" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@xamops" />
    <meta name="twitter:title" content="Cloud Automation Platform for FinOps, DevOps &amp; SRE | Xamops" />
    <meta name="twitter:description" content="Automate cloud operations, reduce infrastructure costs, and optimize performance with Xamops cloud automation platform for FinOps, DevOps, and SRE teams." />
    <meta name="twitter:image" content="https://xamops.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Xamops — Cloud Automation Platform" />

    <!-- ── Organization JSON-LD (static, all pages) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://xamops.com/#organization",
      "name": "XamOps",
      "url": "https://xamops.com",
      "logo": { "@type": "ImageObject", "url": "https://xamops.com/logo.png" },
      "description": "XamOps delivers intelligent cloud automation and FinOps solutions to help organizations optimize cloud operations, reduce infrastructure costs, and improve operational efficiency.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "New Delhi",
        "addressRegion": "Delhi",
        "addressCountry": "IN"
      },
      "sameAs": ["https://www.linkedin.com/company/xamops"],
      "knowsAbout": ["Cloud Automation","FinOps","DevOps Automation","SRE Automation","Cloud Cost Optimization","AI Cloud Operations"]
    }
    </script>

    <!-- ── Fonts (non-blocking) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
