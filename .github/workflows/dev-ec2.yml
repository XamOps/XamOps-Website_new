name: Deploy XamOps Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd XamOps-Website_new/uploads/xamops.com
          npm install

      - name: Build
        run: |
          cd XamOps-Website_new/uploads/xamops.com
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 18.61.83.164 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dist to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            XamOps-Website_new/uploads/xamops.com/dist/ \
            ec2-user@18.61.83.164:~/XamOps-Website_new/dist/

      - name: Restart server
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@18.61.83.164 \
            "cd ~/deploy-scripts && bash deploy.sh restart-only"

      - name: Check deployment log
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@18.61.83.164 \
            "tail -5 ~/deploy-scripts/deploy.log"
