name: Deploy XamOps Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node Setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xamops-app/package-lock.json

      # ── 3. Install & Build ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          cd xamops-app
          npm ci

      - name: Build
        run: |
          cd xamops-app
          npm run build

      # ── 4. Verify build output exists ──────────────────────────────────────
      - name: Verify build output
        run: |
          echo "====== Build Output Files ======"
          ls -lh xamops-app/dist/
          echo ""
          echo "====== index.html preview ======"
          head -10 xamops-app/dist/index.html

      # ── 5. SSH Setup ───────────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # ── 6. Prepare temp folder (ec2-user owns it, no sudo needed) ──────────
      - name: Prepare temp folder on EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            ec2-user@${{ secrets.SSH_HOST }} \
            "rm -rf /home/ec2-user/deploy_tmp && mkdir -p /home/ec2-user/deploy_tmp"

      # ── 7. Rsync to temp folder (avoids permission errors) ─────────────────
      - name: Deploy dist to EC2 (temp folder)
        run: |
          rsync -avz --checksum --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            xamops-app/dist/ \
            ec2-user@${{ secrets.SSH_HOST }}:/home/ec2-user/deploy_tmp/

      # ── 8. Move to Nginx root with sudo & fix permissions ──────────────────
      - name: Swap into Nginx root & set permissions
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            ec2-user@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            echo ">> Clearing old Nginx root..."
            sudo rm -rf /usr/share/nginx/html/*
            echo ">> Copying new build into Nginx root..."
            sudo cp -r /home/ec2-user/deploy_tmp/. /usr/share/nginx/html/
            echo ">> Setting ownership and permissions..."
            sudo chown -R root:root /usr/share/nginx/html/
            sudo chmod -R 755 /usr/share/nginx/html/
            echo ">> Cleaning up temp folder..."
            rm -rf /home/ec2-user/deploy_tmp
            echo "✅ Files in place."
          ENDSSH

      # ── 9. Reload Nginx (no downtime) ──────────────────────────────────────
      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            ec2-user@${{ secrets.SSH_HOST }} \
            "sudo nginx -t && sudo systemctl reload nginx"

      # ── 10. Verify deployment ──────────────────────────────────────────────
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            ec2-user@${{ secrets.SSH_HOST }} << 'EOF'
            echo "====== Nginx Status ======"
            sudo systemctl status nginx --no-pager | head -10
            echo ""
            echo "====== Files in Nginx root (newest first) ======"
            ls -lht /usr/share/nginx/html/ | head -15
            echo ""
            echo "====== index.html preview ======"
            head -10 /usr/share/nginx/html/index.html
            echo ""
            echo "====== Nginx config test ======"
            sudo nginx -t
            echo ""
            echo "✅ Deployment verified!"
          EOF
