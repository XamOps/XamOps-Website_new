name: Deploy XamOps Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node Setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install & Build ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          cd xamops-app
          npm ci

      - name: Build
        run: |
          cd xamops-app
          npm run build

      # ── 4. SSH Setup ───────────────────────────────────────────────────────
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # ── 5. Sync dist directly to Nginx web root ────────────────────────────
      - name: Deploy dist to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            xamops-app/dist/ ec2-user@${{ secrets.EC2_HOST }}:/usr/share/nginx/html/

      # ── 6. Set correct file permissions ────────────────────────────────────
      - name: Set file permissions on EC2
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} \
            "sudo chmod -R 755 /usr/share/nginx/html/"

      # ── 7. Reload Nginx (no downtime) ──────────────────────────────────────
      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} \
            "sudo nginx -t && sudo systemctl reload nginx"

      # ── 8. Verify deployment ───────────────────────────────────────────────
      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
            echo "====== Nginx Status ======"
            sudo systemctl status nginx --no-pager | head -10

            echo ""
            echo "====== Files in Nginx root ======"
            ls -lht /usr/share/nginx/html/ | head -10

            echo ""
            echo "====== index.html preview ======"
            head -5 /usr/share/nginx/html/index.html
          EOF
