<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>XamOps — The Cognitive Cloud Operating System</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
  :root {
    /* Names preserved from v1 — values reskinned to dark theme from PDF */
    --parchment: #0b0d12;   /* page bg */
    --ivory:     #11141b;   /* card / surface */
    --ivory-2:   #161a23;   /* surface-2 / hover */
    --terracotta:#7c5cff;   /* primary accent (violet) */
    --terracotta-deep:#9b82ff; /* primary hover (lighter for dark bg) */
    --ink:       #ecedf2;   /* primary text */
    --ink-2:     #d6d8e0;   /* secondary text-on-dark / ink button hover surface */
    --olive:     #8b90a0;   /* muted text */
    --olive-2:   #5b6173;   /* very muted */
    --rule:      #1f2430;   /* dividers on light surfaces */
    --rule-dark: #262c39;   /* dividers on dark surfaces */
    --moss:      #2bd4a8;   /* success / mint */
    --ochre:     #f0b341;   /* warning / amber */
  }

  html, body { background: var(--parchment); color: var(--ink); }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .serif { font-family: Georgia, 'Times New Roman', serif; font-weight: 500; letter-spacing: -0.01em; }
  .mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  /* Section variants — names preserved from v1, dark-themed */
  .sec-light { background: var(--parchment); color: var(--ink); }
  .sec-card  { background: var(--ivory);     color: var(--ink); }
  .sec-dark  { background: #06080c;          color: var(--ink); }

  /* 1px ring instead of shadow */
  .ring-soft { box-shadow: 0 0 0 1px var(--rule); }
  .ring-soft-dark { box-shadow: 0 0 0 1px var(--rule-dark); }

  /* Reveal lines */
  .reveal-line { overflow: hidden; }
  .reveal-line > span { display: inline-block; transform: translateY(110%); }

  /* CTA */
  .btn-primary {
    background: var(--terracotta); color: #fff;
    border-radius: 8px; padding: 12px 18px;
    font-weight: 500; font-size: 14px;
    transition: background .25s ease, transform .25s ease, box-shadow .25s ease;
    display: inline-flex; align-items: center; gap: 8px;
    box-shadow: 0 0 0 1px rgba(124,92,255,0.4), 0 8px 24px -8px rgba(124,92,255,0.6);
  }
  .btn-primary:hover { background: var(--terracotta-deep); transform: translateY(-1px); box-shadow: 0 0 0 1px rgba(155,130,255,0.5), 0 12px 28px -8px rgba(124,92,255,0.7); }
  /* Was: dark filled CTA on light bg. Now: light filled CTA on dark bg. */
  .btn-dark {
    background: var(--ink); color: var(--parchment);
    border-radius: 8px; padding: 12px 18px;
    font-weight: 500; font-size: 14px;
    transition: background .25s ease, transform .25s ease;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-dark:hover { background: #ffffff; transform: translateY(-1px); }
  .btn-ghost {
    color: var(--ink); border-radius: 8px; padding: 10px 14px;
    font-weight: 500; font-size: 14px;
    box-shadow: 0 0 0 1px var(--rule-dark);
    transition: background .2s, box-shadow .2s;
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.02);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.05); box-shadow: 0 0 0 1px #3a4256; }
  .btn-ghost-dark {
    color: var(--ink); border-radius: 8px; padding: 10px 14px;
    font-weight: 500; font-size: 14px;
    box-shadow: 0 0 0 1px var(--rule-dark);
    transition: background .2s, box-shadow .2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-ghost-dark:hover { background: rgba(255,255,255,0.04); box-shadow: 0 0 0 1px #3a4256; }

  /* Hero grain (now light-on-dark) */
  .grain::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 4px 4px;
    opacity: 0.6;
  }

  /* Eyebrow tag */
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--olive);
  }
  .eyebrow-dark { color: var(--olive-2); }

  /* Ticker */
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .ticker-track { animation: ticker 60s linear infinite; }

  /* Marquee gradient masks */
  .mask-x { mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent); -webkit-mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent); }

  /* Diagonal stripe placeholder (both now light-on-dark) */
  .stripe-light {
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 12px),
      var(--ivory);
  }
  .stripe-dark {
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 12px),
      #06080c;
  }

  /* Card hover */
  .hcard { transition: transform .35s ease, box-shadow .35s ease; }
  .hcard:hover { transform: translateY(-3px); }

  /* Smooth scroll feel */
  html { scroll-behavior: smooth; }

  /* Hide scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a3142; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a4256; }

  /* Live dot */
  .live-dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--moss); box-shadow: 0 0 0 3px rgba(43,212,168,0.22);
    animation: pulse 1.8s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes pulse { 50% { box-shadow: 0 0 0 6px rgba(43,212,168,0); } }

  /* Nav blur */
  .nav-blur { backdrop-filter: blur(12px) saturate(140%); -webkit-backdrop-filter: blur(12px) saturate(140%); }

  /* Hero floating chips */
  .chip {
    background: var(--ivory); color: var(--ink);
    padding: 6px 10px; border-radius: 999px;
    font-size: 12px; box-shadow: 0 0 0 1px var(--rule);
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Underline anim */
  .ulink { position: relative; }
  .ulink::after {
    content: ""; position: absolute; left: 0; bottom: -2px;
    height: 1px; width: 100%; background: currentColor;
    transform: scaleX(0); transform-origin: right;
    transition: transform .35s ease;
  }
  .ulink:hover::after { transform: scaleX(1); transform-origin: left; }

  /* Section labels */
  .sec-label {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 10px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase;
    box-shadow: 0 0 0 1px var(--rule); color: var(--olive);
    background: var(--ivory);
  }
  .sec-label.dark { background: rgba(255,255,255,0.04); color: var(--olive-2); box-shadow: 0 0 0 1px var(--rule-dark); }

  /* Faux dashboard */
  .faux-grid {
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .faux-grid-dark {
    background-image:
      linear-gradient(var(--rule-dark) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule-dark) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* For accessibility focus */
  :focus-visible { outline: 2px solid var(--terracotta); outline-offset: 2px; border-radius: 4px; }

  /* Big numeric */
  .big-num { font-family: Georgia, serif; font-weight: 500; letter-spacing: -0.04em; }

  /* Horiz scroll */
  .hs-card { flex: 0 0 auto; width: 460px; height: 540px; }
  @media (max-width: 700px) { .hs-card { width: 320px; height: 460px; } }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useEffect, useRef, useState, useLayoutEffect, useContext } = React;
gsap.registerPlugin(ScrollTrigger);

/* ---------- Icons (line-style, original) ---------- */
const Icon = {
  Spot:   (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 14l4-4 3 3 6-7"/><path d="M14 6h4v4"/><circle cx="6" cy="18" r="1.2"/><circle cx="12" cy="18" r="1.2"/><circle cx="18" cy="18" r="1.2"/></svg>),
  Disk:   (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" {...p}><ellipse cx="12" cy="6" rx="7" ry="2.2"/><path d="M5 6v6c0 1.2 3.1 2.2 7 2.2s7-1 7-2.2V6"/><path d="M5 12v6c0 1.2 3.1 2.2 7 2.2s7-1 7-2.2v-6"/></svg>),
  DB:     (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><circle cx="7" cy="7" r="0.6" fill="currentColor"/><circle cx="7" cy="17" r="0.6" fill="currentColor"/></svg>),
  Sec:    (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 3l8 3v5c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-3z"/><path d="M9 12l2 2 4-4"/></svg>),
  Cost:   (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 19V5"/><path d="M3 19h18"/><path d="M7 15l3-4 3 2 5-7"/></svg>),
  SRE:    (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>),
  Arrow:  (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>),
  Check:  (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12l4 4 10-10"/></svg>),
  Dot:    (p) => (<svg viewBox="0 0 24 24" fill="currentColor" {...p}><circle cx="12" cy="12" r="3"/></svg>),
  Plus:   (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" {...p}><path d="M12 5v14M5 12h14"/></svg>),
};

/* ---------- Logo ---------- */
function Logo({ dark = false, size = 22 }) {
  const fg = '#ecedf2';
  const accent = '#7c5cff';
  return (
    <div className="flex items-center gap-2">
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
        <path d="M3 4l6 8-6 8" stroke={fg} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M21 4l-6 8 6 8" stroke={fg} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="12" cy="12" r="2" fill={accent}/>
      </svg>
      <span className="serif text-[18px] tracking-tight" style={{color: fg}}>XamOps</span>
    </div>
  );
}

/* ---------- Hash router ---------- */
const RouterCtx = React.createContext({ path: '/', go: () => {} });
function readHash() { const h = window.location.hash || '#/'; return h.replace(/^#/, '') || '/'; }
function RouterProvider({ children }) {
  const [path, setPath] = useState(readHash());
  useEffect(() => {
    const onHash = () => { setPath(readHash()); window.scrollTo({ top: 0, behavior: 'instant' }); };
    window.addEventListener('hashchange', onHash);
    if (!window.location.hash) window.location.hash = '#/';
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const go = (to) => { window.location.hash = '#' + to; };
  return <RouterCtx.Provider value={{ path, go }}>{children}</RouterCtx.Provider>;
}
function useRouter() { return useContext(RouterCtx); }
function Link({ to, className, children, ...rest }) {
  const { go, path } = useRouter();
  return (
    <a href={'#' + to} className={className} aria-current={path === to ? 'page' : undefined}
       onClick={(e) => { e.preventDefault(); go(to); }} {...rest}>{children}</a>
  );
}

/* ---------- Nav ---------- */
function Nav() {
  const [open, setOpen] = useState(null);
  const [scrolled, setScrolled] = useState(false);
  const { path } = useRouter();
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const platform = [
    ['Spot Automation', '/platform/spot-automation', 'AutoSpotting across AWS, GCP, Azure'],
    ['Disk Rightsizing', '/platform/disk-rightsizing', 'The only automated disk rightsizing'],
    ['DBOps', '/platform/dbops', 'Database operations on autopilot'],
    ['SecOps', '/platform/secops', 'Continuous posture and remediation'],
    ['Cost Analytics', '/platform/cost-analytics', 'Real-time savings dashboards'],
    ['SRE Investigation', '/platform/sre', 'AI-assisted incident intelligence'],
  ];
  const solutions = [
    ['For DevOps Engineers', '/solutions/devops', 'Ship, don’t babysit'],
    ['For FinOps Teams', '/solutions/finops', 'Cut waste, prove savings'],
    ['For SRE Teams', '/solutions/sre', 'From alert to root cause, faster'],
  ];
  const isActive = (p) => path === p || path.startsWith(p + '/');

  return (
    <header
      className={`fixed top-0 left-0 right-0 z-50 nav-blur transition-colors`}
      style={{
        background: scrolled ? 'rgba(11,13,18,0.78)' : 'rgba(11,13,18,0.4)',
        boxShadow: scrolled ? '0 1px 0 #1f2430' : 'none',
      }}
      onMouseLeave={() => setOpen(null)}
    >
      <div className="max-w-[1240px] mx-auto px-6 md:px-10 h-[64px] flex items-center justify-between">
        <Link to="/"><Logo /></Link>
        <nav className="hidden md:flex items-center gap-1 text-[14px]" style={{color: 'var(--ink)'}}>
          {[
            ['Platform', '/platform', platform],
            ['Solutions', '/solutions', solutions],
          ].map(([label, base, items]) => (
            <div key={base} className="relative" onMouseEnter={() => setOpen(base)}>
              <Link to={base} className={`px-3 py-2 rounded-md hover:bg-[var(--ivory)] flex items-center gap-1 ${isActive(base) ? 'font-medium' : ''}`}>
                {label}
                <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 3.5L5 6.5l3-3" stroke="currentColor" fill="none" strokeWidth="1.4" strokeLinecap="round"/></svg>
              </Link>
              {open === base && (
                <div className="absolute left-0 top-full pt-2">
                  <div className="ring-soft rounded-xl p-2 w-[420px]" style={{background:'var(--ivory)'}}>
                    {items.map(([n, to, d]) => (
                      <Link key={n} to={to} className="block px-3 py-2.5 rounded-lg hover:bg-[var(--parchment)]">
                        <div className="text-[14px]">{n}</div>
                        <div className="text-[12px]" style={{color:'var(--olive)'}}>{d}</div>
                      </Link>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ))}
          <Link to="/pricing" className={`px-3 py-2 rounded-md hover:bg-[var(--ivory)] ${isActive('/pricing') ? 'font-medium' : ''}`}>Pricing</Link>
          <Link to="/about" className={`px-3 py-2 rounded-md hover:bg-[var(--ivory)] ${isActive('/about') ? 'font-medium' : ''}`}>About</Link>
          <Link to="/blog" className={`px-3 py-2 rounded-md hover:bg-[var(--ivory)] ${isActive('/blog') ? 'font-medium' : ''}`}>Blog</Link>
        </nav>
        <div className="flex items-center gap-2">
          <Link to="/demo" className="hidden sm:inline-flex btn-primary">Book Demo</Link>
          <Link to="/demo" className="btn-dark">Sign Up <Icon.Arrow width="14" height="14"/></Link>
        </div>
      </div>
    </header>
  );
}

/* ---------- Reveal helper ---------- */
function useReveal(ref, opts = {}) {
  useLayoutEffect(() => {
    if (!ref.current) return;
    const ctx = gsap.context(() => {
      const lines = ref.current.querySelectorAll('.reveal-line > span');
      if (lines.length) {
        gsap.fromTo(lines, { y: '110%' }, {
          y: '0%', duration: 1.05, ease: 'power3.out', stagger: 0.08,
          scrollTrigger: { trigger: ref.current, start: opts.start || 'top 82%', invalidateOnRefresh: true }
        });
      }
      const fades = ref.current.querySelectorAll('[data-fade]');
      if (fades.length) {
        gsap.fromTo(fades, { y: 24, opacity: 0 }, {
          y: 0, opacity: 1, duration: 0.9, ease: 'power3.out', stagger: 0.08,
          scrollTrigger: { trigger: ref.current, start: opts.start || 'top 82%', invalidateOnRefresh: true }
        });
      }
    }, ref);
    return () => ctx.revert();
  }, []);
}

/* ---------- Hero ---------- */
function Hero() {
  const ref = useRef();
  const bgRef = useRef();

  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
      tl.from('.hero-eyebrow', { y: 14, opacity: 0, duration: 0.7 })
        .to('.hero-line > span', { y: '0%', duration: 1.1, stagger: 0.09 }, '-=0.4')
        .from('.hero-sub', { y: 16, opacity: 0, duration: 0.8 }, '-=0.6')
        .from('.hero-ctas > *', { y: 14, opacity: 0, duration: 0.7, stagger: 0.08 }, '-=0.5')
        .from('.hero-strip', { y: 20, opacity: 0, duration: 0.8 }, '-=0.4')
        .from('.hero-floats > *', { y: 14, opacity: 0, duration: 0.7, stagger: 0.08 }, '-=0.6');

      gsap.to(bgRef.current, {
        yPercent: 18, ease: 'none',
        scrollTrigger: { trigger: ref.current, start: 'top top', end: 'bottom top', scrub: true }
      });
    }, ref);
    return () => ctx.revert();
  }, []);

  return (
    <section ref={ref} className="sec-light relative grain pt-[120px] pb-20 overflow-hidden">
      {/* Parallax canvas */}
      <div ref={bgRef} aria-hidden className="absolute inset-0 pointer-events-none">
        <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
          <defs>
            <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
              <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.05)"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#dots)"/>
        </svg>
        <div className="absolute -top-20 -left-20 w-[480px] h-[480px] rounded-full"
             style={{background:'radial-gradient(closest-side, rgba(201,100,66,0.18), transparent 70%)'}}/>
        <div className="absolute top-40 right-0 w-[520px] h-[520px] rounded-full"
             style={{background:'radial-gradient(closest-side, rgba(180,138,60,0.12), transparent 70%)'}}/>
      </div>

      <div className="max-w-[1240px] mx-auto px-6 md:px-10 relative">
        <div className="hero-eyebrow eyebrow flex items-center gap-2 mb-8">
          <span className="live-dot"/> Now in private beta · v1.0
        </div>

        <h1 className="serif text-[clamp(48px,8vw,116px)] leading-[0.95] tracking-tight max-w-[14ch]">
          <div className="reveal-line"><span className="hero-line">The Cognitive</span></div>
          <div className="reveal-line"><span className="hero-line" style={{color:'var(--terracotta)'}}>Cloud Operating</span></div>
          <div className="reveal-line"><span className="hero-line">System.</span></div>
        </h1>

        <p className="hero-sub mt-8 text-[18px] md:text-[20px] leading-[1.55] max-w-[640px]" style={{color:'var(--olive)'}}>
          Automate cloud operations across <span style={{color:'var(--ink)'}}>AWS</span>, <span style={{color:'var(--ink)'}}>GCP</span>, and <span style={{color:'var(--ink)'}}>Azure</span>. Cut costs by up to 70%. Eliminate toil. Move faster than your infrastructure can drift.
        </p>

        <div className="hero-ctas mt-10 flex flex-wrap items-center gap-3">
          <a href="#demo" className="btn-primary">Book a demo <Icon.Arrow width="14" height="14"/></a>
          <a href="#" className="btn-dark">Sign up free</a>
          <a href="#" className="btn-ghost">
            <span className="mono text-[12px]" style={{color:'var(--olive)'}}>$ </span>
            See live savings
          </a>
        </div>

        {/* Hero strip — faux dashboard */}
        <div className="hero-strip mt-16 ring-soft rounded-[28px] overflow-hidden" style={{background:'var(--ivory)'}}>
          <div className="flex items-center justify-between px-5 py-3 border-b" style={{borderColor:'var(--rule)'}}>

/* ---------- Pinned horizontal scroll ---------- */
function HorizontalScroll() {
  const sectionRef = useRef();
  const trackRef = useRef();
  const headRef = useRef();

  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      const track = trackRef.current;
      const section = sectionRef.current;

      const getDistance = () => track.scrollWidth - window.innerWidth + 80;

      const tween = gsap.to(track, {
        x: () => -getDistance(),
        ease: 'none',
        scrollTrigger: {
          trigger: section,
          start: 'top top',
          end: () => '+=' + getDistance(),
          pin: true,
          scrub: 1,
          invalidateOnRefresh: true,
          anticipatePin: 1,
        }
      });

      // progress bar
      const bar = section.querySelector('.hs-progress > i');
      ScrollTrigger.create({
        trigger: section,
        start: 'top top',
        end: () => '+=' + getDistance(),
        scrub: true,
        onUpdate: (self) => { if (bar) bar.style.transform = `scaleX(${self.progress})`; },
      });

      gsap.from(headRef.current.querySelectorAll('[data-fade]'), {
        y: 24, opacity: 0, duration: 0.9, ease: 'power3.out', stagger: 0.08,
        scrollTrigger: { trigger: section, start: 'top 80%' }

/* ---------- Metrics strip ---------- */
function Metrics() {
  const ref = useRef();
  useLayoutEffect(() => {
    const ctx = gsap.context(() => {
      ref.current.querySelectorAll('[data-num]').forEach(el => {
        const target = parseFloat(el.dataset.num);
        const dec = parseInt(el.dataset.dec || '0');
        const suf = el.dataset.suf || '';
        const pre = el.dataset.pre || '';
        const o = { v: 0 };
        gsap.to(o, {
          v: target, duration: 1.6, ease: 'power3.out',
          onUpdate: () => { el.textContent = pre + o.v.toFixed(dec) + suf; },
          scrollTrigger: { trigger: el, start: 'top 85%', once: true }
        });
      });
    }, ref);
    return () => ctx.revert();
  }, []);
  return (
    <section ref={ref} className="sec-light py-24 border-t border-b" style={{borderColor:'var(--rule)'}}>
      <div className="max-w-[1240px] mx-auto px-6 md:px-10 grid md:grid-cols-4 gap-px rounded-2xl overflow-hidden ring-soft" style={{background:'var(--rule)'}}>

const ROUTES = {
  '/':                          HomePage,
  '/platform':                  PlatformPage,
  '/platform/spot-automation':  SpotPage,
  '/platform/disk-rightsizing': DiskPage,
  '/platform/dbops':            DBOpsPage,
  '/platform/secops':           SecOpsPage,

  '/pricing':                   PricingPage,
  '/about':                     AboutPage,
  '/demo':                      DemoPage,
  '/blog':                      BlogPage,
  '/contact':                   ContactPage,
};

/* ---------- App ---------- */
function RoutedApp() {
  const { path } = useRouter();
  const Page = ROUTES[path] || NotFoundPage;
  const firstRun = useRef(true);
  useEffect(() => {
    // On first render, components are still mounting & registering their triggers.
    // Don't kill them — just refresh once they're laid out.
    if (!firstRun.current) {
      ScrollTrigger.getAll().forEach((t) => t.kill());
    }
    firstRun.current = false;
    window.scrollTo(0, 0);
    const t1 = setTimeout(() => ScrollTrigger.refresh(), 250);
    const t2 = setTimeout(() => ScrollTrigger.refresh(), 900);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [path]);
  return (
    <>
      <Nav/>
      <main key={path}><Page/></main>
      <Footer/>
    </>
  );
}

function App() {
  return (
    <RouterProvider>
      <RoutedApp/>
    </RouterProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
